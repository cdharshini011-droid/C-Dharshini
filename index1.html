<!DOCTYPE html>
<html>
<head>
    <title>To-Do List</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
            width: 350px;
        }

        h1 {
            text-align: center;
            color: #333;
        }

        .input-area {
            display: flex;
            margin-bottom: 20px;
        }

        input {
            flex: 1;
            padding: 10px;
            font-size: 16px;
        }

        button {
            padding: 10px 15px;
            background-color: #28a745;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: #218838;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            background: #eee;
            padding: 10px;
            margin-bottom: 10px;https://github.com/cdharshini011-droid/Myportfolio.git
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 5px;
        }

        .delete-btn {
            background-color: red;
            color: white;
            border: none;
            padding: 5px 10px;
            cursor: pointer;
        }
        .delete-btn:hover {
            background-color: darkred;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>To-Do List</h1>

    <div class="input-area">
        <input type="text" id="taskInput" placeholder="Enter a task">
        <button onclick="addTask()">Add</button>
    </div>

    <ul id="taskList"></ul>
</div>

<script>
    function addTask() {
        let taskInput = document.getElementById("taskInput");
        let taskText = taskInput.value;

        if (taskText === "") {
            alert("Please enter a task!");
            return;
        }

        let li = document.createElement("li");
        li.innerHTML = `
            ${taskText}
            <button class="delete-btn" onclick="deleteTask(this)">Delete</button>
        `;

        document.getElementById("taskList").appendChild(li);
        taskInput.value = "";
    }

    function deleteTask(button) {
        button.parentElement.remove();
    }
</script>

</body>
</html>
